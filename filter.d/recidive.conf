# Fail2Ban filter for repeat bans
#

[Definition]

_daemon = fail2ban\.actions

# Failregex: find all the IPs that have been banned by fail2ban
# 修正: [1]などのプロセスIDを含む形式に対応
failregex = ^.* fail2ban\.actions\s+\[.*\]:\s*NOTICE\s+\[(?!(recidive|death-penalty)\]).*\]\s+Ban\s+<HOST>\s*$

# Ignoreregex: 
ignoreregex = 
