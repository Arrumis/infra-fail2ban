[Definition]
_daemon = sshd

failregex = 
    ^.*sshd.*: Failed password for .* from <HOST> port \d+ ssh2$
    ^.*sshd.*: Failed password for invalid user .* from <HOST> port \d+ ssh2$
    ^.*sshd.*: Failed keyboard-interactive/pam for .* from <HOST> port \d+ ssh2$
    ^.*sshd.*: Invalid user .* from <HOST> port \d+$
    ^.*sshd.*: Connection closed by invalid user .* <HOST> port \d+ \[preauth\]$
    ^.*sshd.*: Connection closed by <HOST> port \d+(?: \[preauth\])?$
    ^.*sshd.*: error: PAM: Authentication failure for .* from <HOST>$
    ^.*sshd.*: error: maximum authentication attempts exceeded for .* from <HOST> port \d+ \[preauth\]$
    ^.*sshd.*: Disconnected from invalid user .* <HOST> port \d+ \[preauth\]$
    ^.*sshd.*: Disconnected from authenticating user .* <HOST> port \d+ \[preauth\]$
    ^.*sshd.*: Did not receive identification string from <HOST>$
    ^.*sshd.*: Bad protocol version identification '.*' from <HOST>$
    ^.*sshd.*: pam_unix\(sshd:auth\): authentication failure;.* rhost=<HOST>.*$
ignoreregex =
